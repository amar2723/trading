name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r trading_ai/requirements.txt
      - name: Compile
        working-directory: trading_ai
        run: python -m compileall .
      - name: Test
        working-directory: trading_ai
        run: python -m pytest tests --basetemp .pytest_tmp

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: trading_ai
        run: docker build -t trading-ai:ci .

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment placeholder
        run: |
          echo "Configure SSH secrets and deployment host to enable production deploy."
          echo "Recommended secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH."
